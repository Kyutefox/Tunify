name: CI

on:
  push:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install pkg/tunify_source_youtube_music dependencies
        run: flutter pub get
        working-directory: pkg/tunify_source_youtube_music

      - name: Install pkg/tunify_music_ports dependencies
        run: dart pub get
        working-directory: pkg/tunify_music_ports

      - name: Install pkg/tunify_database dependencies
        run: flutter pub get
        working-directory: pkg/tunify_database

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Run unit tests
        run: flutter test
