name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable
          cache: true

      - name: Install root dependencies
        run: flutter pub get

      - name: Install pkg/scrapper dependencies
        run: flutter pub get
        working-directory: pkg/scrapper

      - name: Install pkg/logger dependencies
        run: flutter pub get
        working-directory: pkg/logger

      - name: Install pkg/tunify_database dependencies
        run: flutter pub get
        working-directory: pkg/tunify_database

      - name: Analyze
        run: flutter analyze --fatal-warnings

      - name: Run unit tests
        run: flutter test
