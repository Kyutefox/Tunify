name: tunify
description: A Flutter music app that streams from YouTube Music.
publish_to: "none"
version: 1.0.2+3

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  scrapper:
    path: pkg/scrapper
  just_audio: ^0.10.5
  audio_session: ^0.2.2
  flutter_riverpod: ^3.3.1
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  http: ^1.2.0
  flutter_animate: ^4.5.2
  palette_generator: ^0.3.3+4
  skeletonizer: ^2.1.0+1
  supabase_flutter: ^2.8.4
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0
  hugeicons: ^1.1.5
  chromecast_dlna_finder: ^1.5.1
  on_audio_query_pluse: ^3.0.6
  flutter_svg: ^2.2.4
  audio_service: ^0.18.18
  rxdart: ^0.28.0
  freezed_annotation: ^3.1.0
  tunify_logger:
    path: pkg/logger
  tunify_database:
    path: pkg/tunify_database
  connectivity_plus: ^7.1.0
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.1
  file_picker: ^11.0.2
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.12.2
  freezed: ^3.2.5
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
  assets:
    - assets/
